<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Departments</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">Vacation Planner</a>
  </div>
</nav>

<div class="container mt-5">
  <h1>Departments</h1>
  <a th:href="@{/departments/create}" class="btn btn-primary mb-3">Create New Department</a>
  <table class="table">
    <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="department : ${departments}">
      <td th:text="${department.id}"></td>
      <td th:text="${department.name}"></td>
      <td>
        <a th:href="@{/departments/edit/{id}(id=${department.id})}" class="btn btn-secondary btn-sm">Edit</a>
        <a th:href="@{/departments/delete/{id}(id=${department.id})}" class="btn btn-danger btn-sm">Delete</a>
      </td>
    </tr>
    </tbody>
  </table>
</div>
</body>
</html>
