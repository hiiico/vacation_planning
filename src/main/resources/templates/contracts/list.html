<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Contracts</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Vacation Planner</a>
    </div>
</nav>

<div class="container mt-5">
    <h1>Contracts for User ID: <span th:text="${userId}"></span></h1>
    <a th:href="@{/contracts/create/{userId}(userId=${userId})}" class="btn btn-primary mb-3">Create New Contract</a>
    <table class="table">
        <thead>
        <tr>
            <th>ID</th>
            <th>Contract Type</th>
            <th>Start Date</th>
            <th>End Date</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="contract : ${contracts}">
            <td th:text="${contract.id}"></td>
            <td th:text="${contract.contractType}"></td>
            <td th:text="${#temporals.format(contract.startDate, 'MMM dd, yyyy')}"></td>
            <td th:text="${#temporals.format(contract.endDate, 'MMM dd, yyyy')}"></td>
            <td>
                <a th:href="@{/contracts/delete/{id}(id=${contract.id})}" class="btn btn-danger btn-sm">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
