<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Vacation</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Vacation Planner</a>
    </div>
</nav>

<div class="container mt-5">
    <h1>Create Vacation</h1>
    <form th:action="@{/vacations/create/{userId}(userId=${userId})}" th:object="${vacation}" method="post">
        <div class="mb-3">
            <label for="destination" class="form-label">Destination</label>
            <select class="form-control" id="destination" th:field="*{destination}">
                <option th:each="destination : ${destinations}" th:value="${destination.id}" th:text="${destination.name}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label for="startDate" class="form-label">Start Date</label>
            <input type="date" class="form-control" id="startDate" th:field="*{startDate}" required>
        </div>
        <div class="mb-3">
            <label for="endDate" class="form-label">End Date</label>
            <input type="date" class="form-control" id="endDate" th:field="*{endDate}" required>
        </div>
        <button type="submit" class="btn btn-primary">Create</button>
    </form>
</div>
</body>
</html>
